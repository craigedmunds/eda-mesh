apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: image-factory
  namespace: argocd
  labels:
    repo: image-factory-state
    capability: image-factory
    argocd-branch-targetrevision: "true"
spec:
  project: sdlc
  source:
    repoURL: https://github.com/craigedmunds/image-factory-state.git
    path: dist
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: image-factory
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
      enabled: true
  ignoreDifferences:
    # Kargo adds kargo.akuity.io/refresh annotation at runtime - ignore it
    - group: kargo.akuity.io
      kind: Warehouse
      jsonPointers:
        - /metadata/annotations/kargo.akuity.io~1refresh